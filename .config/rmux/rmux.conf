# rmux configuration

# Nord palette
# nord0  #2e3440   nord1  #3b4252   nord2  #434c5e   nord3  #4c566a
# nord4  #d8dee9   nord5  #e5e9f0   nord6  #eceff4
# nord7  #8fbcbb   nord8  #88c0d0   nord9  #81a1c1   nord10 #5e81ac
# nord11 #bf616a   nord12 #d08770   nord13 #ebcb8b   nord14 #a3be8c   nord15 #b48ead

# -- general ------------------------------------------------------------

set -g mouse on
set -s escape-time 10
set -g repeat-time 600
set -g history-limit 10000
set -g base-index 1
set -g renumber-windows on
set -g status-interval 10

setw -g pane-base-index 1
setw -g mode-keys vi
set -g status-keys vi

# clipboard on macOS
set -s copy-command 'pbcopy'

# -- prefix -------------------------------------------------------------

unbind C-b
set -g prefix C-\\
bind C-\\ send-prefix

# -- panes ---------------------------------------------------------------

# split
bind - split-window -v
bind _ split-window -h

# navigation (vi-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# swap
bind > swap-pane -D
bind < swap-pane -U

# resize
bind H resize-pane -L 2
bind J resize-pane -D 2
bind K resize-pane -U 2
bind L resize-pane -R 2

# -- windows -------------------------------------------------------------

bind c new-window -c "#{pane_current_path}"

bind C-h previous-window
bind C-l next-window
bind Tab last-window

# -- mouse toggle --------------------------------------------------------

bind T if-shell -F '#{mouse}' \
  'set -g mouse off ; display-message "mouse OFF"' \
  'set -g mouse on  ; display-message "mouse ON"'

# -- reload --------------------------------------------------------------

bind r source-file "$HOME/.config/rmux/rmux.conf" \; \
  display-message "rmux.conf reloaded"

# -- copy mode (vi) ------------------------------------------------------

bind Enter copy-mode
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# -- theming: Nord -------------------------------------------------------

# message / command / mode
set -g message-style fg=#2e3440,bg=#ebcb8b,bold
set -g message-command-style fg=#ebcb8b,bg=#2e3440,bold
set -g mode-style fg=#2e3440,bg=#ebcb8b,bold

# status line base
set -g status-style fg=#4c566a,bg=#2e3440

# status left — session name
set -g status-left "#[fg=#e5e9f0,bg=#2e3440,bold] #S "
set -g status-left-length 24

# status right — time, date (no battery or uptime: rmux has no shell)
set -g status-right "#[fg=#d8dee9,bg=#3b4252] %R #[fg=#eceff4,bg=#434c5e] %d %b "
set -g status-right-length 64

# window status
setw -g window-status-style fg=#e5e9f0,bg=#3b4252
setw -g window-status-format " #I #W "

# window current status
setw -g window-status-current-style fg=#eceff4,bg=#5e81ac,bold
setw -g window-status-current-format " #I #W "

# window activity / bell / last
setw -g window-status-activity-style fg=default,bg=default,underscore
setw -g window-status-bell-style fg=#ebcb8b,bg=default,bold
setw -g window-status-last-style fg=#88c0d0,bg=#434c5e

# pane borders
set -g pane-border-style fg=#434c5e
set -g pane-active-border-style fg=#88c0d0

# clock (prefix + t)
set -g clock-mode-colour "#88c0d0"
set -g clock-mode-style 24
